{% extends "base.html" %}
{% block title %}Register – RainCast{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>🌧 RainCast</h1>
    <p class="auth-sub">Create your account</p>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required />
      </div>
      <button type="submit" class="btn-primary full-w">Create Account</button>
    </form>
    <p class="auth-link">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
