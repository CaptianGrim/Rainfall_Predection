{% extends "base.html" %}
{% block title %}Login – RainCast{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>🌧 RainCast</h1>
    <p class="auth-sub">ML-powered rainfall prediction</p>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required />
      </div>
      <button type="submit" class="btn-primary full-w">Login</button>
    </form>
    <p class="auth-link">No account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
